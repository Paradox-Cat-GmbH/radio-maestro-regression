appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: Open Favourites list
tags:
  - subflow
  - radio
---
# IDC23 exposes this tab as uppercase FAVOURITES. Other builds may use mixed case.
# Clear any lingering station context menu before switching tabs.
- runFlow:
    when:
      visible:
        text: '(?i)add to favourites'
    commands:
      - pressKey: BACK
      - waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: '(?i)remove from favourites'
    commands:
      - pressKey: BACK
      - waitForAnimationToEnd
- tapOn: '(?i)favourites'
- waitForAnimationToEnd
