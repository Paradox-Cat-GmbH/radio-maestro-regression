appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: Open Favourites list
tags:
  - subflow
  - radio
---
- extendedWaitUntil:
    visible:
      text: '(?i)all stations'
    timeout: 10000
    optional: true

# IDC23 exposes this tab as uppercase FAVOURITES. Other builds may use mixed case.
# Clear any lingering station context menu before switching tabs.
- runFlow:
    when:
      visible:
        text: '(?i)add to favourites'
    commands:
      - pressKey: BACK
      - waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: '(?i)remove from favourites'
    commands:
      - pressKey: BACK
      - waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: '(?i)favourites'
    commands:
      - tapOn:
          text: '(?i)favourites'
          retryTapIfNoChange: true
- runFlow:
    when:
      notVisible:
        text: '(?i)favourites'
    commands:
      - runFlow:
          when:
            visible:
              text: '(?i)all stations'
          commands:
            - tapOn:
                point: '35%,12%'
                retryTapIfNoChange: true
- waitForAnimationToEnd
