appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: Open All stations list
tags:
  - subflow
  - radio
---
- tapOn: "All stations"

- evalScript: ${output.allStationsListReady = false}

- repeat:
    times: 3
    while:
      true: ${output.allStationsListReady != true}
    commands:
      - runFlow:
          when:
            visible:
              id: "ListImageComponent ImageRightIcon"
              index: 0
          commands:
            - evalScript: ${output.allStationsListReady = true}

      - runFlow:
          when:
            visible:
              id: "ListlmageComponent ImageRightlcon"
              index: 0
          commands:
            - evalScript: ${output.allStationsListReady = true}

      - runFlow:
          when:
            true: ${output.allStationsListReady != true}
          commands:
            - waitForAnimationToEnd
            - tapOn:
                text: "All stations"
                optional: true

- assertTrue: ${output.allStationsListReady == true}
