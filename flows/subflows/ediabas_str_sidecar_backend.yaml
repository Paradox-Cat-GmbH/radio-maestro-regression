appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: ediabas_str_sidecar_backend
tags:
  - helper
  - subflow
  - backend
  - ediabas
---
- runScript:
    file: ../../scripts/maestro/ediabas_str_sidecar_backend.js
    env:
      TEST_ID: ${TEST_ID}
      STR_SECONDS: ${STR_SECONDS}
      SETTLE_SECONDS: ${SETTLE_SECONDS}
      TIMEOUT_SECONDS: ${TIMEOUT_SECONDS}
      RETRIES: ${RETRIES}
      ECU: ${ECU}
      JOB: ${JOB}
      ARGPAD: ${ARGPAD}
      ARGWOHNEN: ${ARGWOHNEN}
      ARGPARKING: ${ARGPARKING}
      WAIT_AFTER_PAD_INITIAL_SECONDS: ${WAIT_AFTER_PAD_INITIAL_SECONDS}
      WAIT_AFTER_WOHNEN_ENTER_SECONDS: ${WAIT_AFTER_WOHNEN_ENTER_SECONDS}
      WAIT_AFTER_PARKING_COMMAND_SECONDS: ${WAIT_AFTER_PARKING_COMMAND_SECONDS}
      WAIT_AFTER_WOHNEN_RETURN_SECONDS: ${WAIT_AFTER_WOHNEN_RETURN_SECONDS}
      WAIT_AFTER_PAD_RETURN_SECONDS: ${WAIT_AFTER_PAD_RETURN_SECONDS}
      SKIP_INITIAL_PAD: ${SKIP_INITIAL_PAD}
      PRE1_ECU: ${PRE1_ECU}
      PRE1_JOB: ${PRE1_JOB}
      PRE1_ARG: ${PRE1_ARG}
      PRE1_WAIT_SECONDS: ${PRE1_WAIT_SECONDS}
      PRE2_ECU: ${PRE2_ECU}
      PRE2_JOB: ${PRE2_JOB}
      PRE2_ARG: ${PRE2_ARG}
      PRE2_WAIT_SECONDS: ${PRE2_WAIT_SECONDS}
