appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: Open Shortcuts panel
tags:
  - subflow
  - radio
---
# Older packs used a visible "Shortcuts" label. IDC23 exposes a Toolbelt header instead.
- runFlow: ../idc23/subflows/common/dismiss_media_popup_if_present_idc23.yaml
- runFlow:
    when:
      visible: "Shortcuts"
    commands:
      - tapOn:
          text: "Shortcuts"
          retryTapIfNoChange: true
      - waitForAnimationToEnd

- runFlow:
    when:
      notVisible: "Shortcuts"
    commands:
      - runFlow:
          when:
            visible:
              id: "com.bmwgroup.idnext.toolbelt:id/top_touchable_area_in_bar"
          commands:
            - tapOn:
                id: "com.bmwgroup.idnext.toolbelt:id/top_touchable_area_in_bar"
                retryTapIfNoChange: true
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              id: "com.bmwgroup.idnext.toolbelt:id/tool_belt_root"
          commands:
            - tapOn:
                id: "com.bmwgroup.idnext.toolbelt:id/tool_belt_root"
                retryTapIfNoChange: true
            - waitForAnimationToEnd
      - swipe:
          start: "50%,2%"
          end: "50%,22%"
          duration: 300
      - waitForAnimationToEnd
      - runFlow: ../idc23/subflows/common/dismiss_media_popup_if_present_idc23.yaml
