appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: verify_radio_backend
tags:
  - helper
  - subflow
  - backend
  - radio
---
- runScript:
    file: ../../scripts/maestro/radio_check.js

# One retry helps with transient control-server races right after tune.
- runFlow:
    when:
      true: ${output.radioCheckSkipped == true}
    commands:
      - waitForAnimationToEnd
      - runScript:
          file: ../../scripts/maestro/radio_check.js

- evalScript: ${output.radioAllowSkip = (typeof MAESTRO_RADIO_ALLOW_SKIP !== 'undefined' && String(MAESTRO_RADIO_ALLOW_SKIP).toLowerCase() == 'true')}

- runFlow:
    when:
      true: ${output.radioCheckSkipped == true}
    commands:
      - evalScript: "${output.radioBackendCheckResult = 'SKIPPED: ' + output.radioCheckReason}"
      - runFlow:
          when:
            true: ${output.radioAllowSkip != true}
          commands:
            - assertTrue: ${output.radioCheckSkipped != true}

- runFlow:
    when:
      true: ${output.radioCheckSkipped != true}
    commands:
      - assertTrue: ${output.radioStrictOk == true}
      - assertTrue: ${output.radioVerdict.media.playing == true}
      - assertTrue: ${output.radioVerdict.audio.audioFocus == true}
      - assertTrue: ${output.radioVerdict.media.package == 'com.bmwgroup.apinext.tunermediaservice'}
