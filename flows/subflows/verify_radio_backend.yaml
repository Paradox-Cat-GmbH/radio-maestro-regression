appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: verify_radio_backend
tags:
  - helper
  - subflow
  - backend
  - radio
---
- runScript:
    file: ../../scripts/maestro/radio_check.js

- runFlow:
    when:
      true: ${output.radioCheckSkipped == true}
    commands:
      - evalScript: "${output.radioBackendCheckResult = 'SKIPPED: ' + output.radioCheckReason}"

- runFlow:
    when:
      true: ${output.radioCheckSkipped != true}
    commands:
      - assertTrue: ${output.radioStrictOk == true}
      - assertTrue: ${output.radioVerdict.media.playing == true}
      - assertTrue: ${output.radioVerdict.audio.audioFocus == true}
      - assertTrue: ${output.radioVerdict.media.package == 'com.bmwgroup.apinext.tunermediaservice'}
