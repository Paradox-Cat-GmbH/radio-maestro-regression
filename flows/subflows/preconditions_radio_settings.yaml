appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: Preconditions - Radio settings baseline (Leandro)
tags:
  - subflow
  - preconditions
  - radio
---
# Leandro baseline from Radio:
# 1) Open settings
# 2) Disable "Auto Media Fullscreen" (if enabled) and confirm disabled
# 3) Open Radio settings
# 4) Ensure station sorting is Alphabetically
# 5) Disable "Radio info" (if enabled) and confirm disabled
# 6) Close Radio settings
# 7) Close Settings
#
# Assumes caller already navigated to Radio ("All stations" visible).

- extendedWaitUntil:
    visible:
      text: "All stations"
    timeout: 20000

# 1) Open settings (from Radio)
- tapOn:
    id: idx_icon_settings

- extendedWaitUntil:
    visible:
      id: media_app_auto_media_fullscreen_toggle_bt
    timeout: 20000

# 2) Auto Media Fullscreen OFF: use switch state if exposed; fail if no state signal is detectable.
- evalScript: ${output.fullscreenDisabled = false; output.fullscreenStateObserved = false}

- runFlow:
    when:
      visible:
        id: media_app_auto_media_fullscreen_toggle_bt
        checked: true
    commands:
      - evalScript: ${output.fullscreenStateObserved = true}
      - tapOn:
          id: media_app_auto_media_fullscreen_toggle_bt
      - waitForAnimationToEnd

- runFlow:
    when:
      true: ${output.fullscreenStateObserved != true}
    commands:
      - runFlow:
          when:
            visible:
              id: media_app_auto_media_fullscreen_toggle_bt
              selected: true
          commands:
            - evalScript: ${output.fullscreenStateObserved = true}
            - tapOn:
                id: media_app_auto_media_fullscreen_toggle_bt
            - waitForAnimationToEnd

- runFlow:
    when:
      true: ${output.fullscreenStateObserved != true}
    commands:
      - runFlow:
          when:
            visible:
              id: media_app_auto_media_fullscreen_toggle_bt
              text: "On"
          commands:
            - evalScript: ${output.fullscreenStateObserved = true}
            - tapOn:
                id: media_app_auto_media_fullscreen_toggle_bt
            - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        id: media_app_auto_media_fullscreen_toggle_bt
        checked: false
    commands:
      - evalScript: ${output.fullscreenStateObserved = true; output.fullscreenDisabled = true}

- runFlow:
    when:
      true: ${output.fullscreenDisabled != true}
    commands:
      - runFlow:
          when:
            visible:
              id: media_app_auto_media_fullscreen_toggle_bt
              selected: false
          commands:
            - evalScript: ${output.fullscreenStateObserved = true; output.fullscreenDisabled = true}

- runFlow:
    when:
      true: ${output.fullscreenDisabled != true}
    commands:
      - runFlow:
          when:
            visible:
              id: media_app_auto_media_fullscreen_toggle_bt
              text: "Off"
          commands:
            - evalScript: ${output.fullscreenStateObserved = true; output.fullscreenDisabled = true}

- assertTrue: ${output.fullscreenStateObserved == true}
- assertTrue: ${output.fullscreenDisabled == true}

# 3) From Settings, open Radio settings
- evalScript: ${output.radioSettingsOpen = false}

- repeat:
    times: 3
    while:
      true: ${output.radioSettingsOpen != true}
    commands:
      - runFlow:
          when:
            visible:
              id: tuner_service_settings_radio_info_opt
          commands:
            - evalScript: ${output.radioSettingsOpen = true}

      - runFlow:
          when:
            visible:
              text: "Sort available stations"
          commands:
            - evalScript: ${output.radioSettingsOpen = true}

      - runFlow:
          when:
            visible:
              text: "Radio info"
          commands:
            - evalScript: ${output.radioSettingsOpen = true}

      - runFlow:
          when:
            visible:
              text: "By frequency"
          commands:
            - evalScript: ${output.radioSettingsOpen = true}

      - runFlow:
          when:
            visible:
              text: "Public value"
          commands:
            - evalScript: ${output.radioSettingsOpen = true}

      - runFlow:
          when:
            true: ${output.radioSettingsOpen != true}
          commands:
            - tapOn:
                id: media_app_source_settings_bt
                optional: true
                retryTapIfNoChange: true
            - tapOn:
                text: "Radio settings"
                optional: true
                retryTapIfNoChange: true
            - runFlow:
                when:
                  visible:
                    text: "Radio settings"
                commands:
                  - tapOn:
                      point: "50%,27%"
                  - waitForAnimationToEnd
            - waitForAnimationToEnd

      - runFlow:
          when:
            visible:
              id: tuner_service_settings_radio_info_opt
          commands:
            - evalScript: ${output.radioSettingsOpen = true}

      - runFlow:
          when:
            visible:
              text: "Sort available stations"
          commands:
            - evalScript: ${output.radioSettingsOpen = true}

      - runFlow:
          when:
            visible:
              text: "Radio info"
          commands:
            - evalScript: ${output.radioSettingsOpen = true}

      - runFlow:
          when:
            visible:
              text: "By frequency"
          commands:
            - evalScript: ${output.radioSettingsOpen = true}

      - runFlow:
          when:
            visible:
              text: "Public value"
          commands:
            - evalScript: ${output.radioSettingsOpen = true}

- assertTrue: ${output.radioSettingsOpen == true}

# 4) Sorting: force-select Alphabetically and verify when state is exposed.
- runFlow:
    when:
      visible:
        text: "Default sorting"
    commands:
      - tapOn:
          text: "Default sorting"

- runFlow:
    when:
      visible:
        text: "Default Sorting"
    commands:
      - tapOn:
          text: "Default Sorting"

- runFlow:
    when:
      visible:
        text: "Sort available stations"
    commands:
      - tapOn:
          text: "Sort available stations"

- extendedWaitUntil:
    visible:
      text: "Alphabetically"
    timeout: 10000

- evalScript: ${output.sortAlphabetically = false; output.sortStateObserved = false; output.sortSelectionApplied = false}

- runFlow:
    when:
      visible:
        id: tuner_service_settings_station_sorting_option_alphanumerical_opt
        text: "Alphabetically"
        checked: true
    commands:
      - evalScript: ${output.sortStateObserved = true; output.sortAlphabetically = true}

- runFlow:
    when:
      true: ${output.sortStateObserved != true}
    commands:
      - runFlow:
          when:
            visible:
              id: tuner_service_settings_station_sorting_option_alphanumerical_opt
              text: "Alphabetically"
              selected: true
          commands:
            - evalScript: ${output.sortStateObserved = true; output.sortAlphabetically = true}

- runFlow:
    when:
      true: ${output.sortAlphabetically != true}
    commands:
      - runFlow:
          when:
            visible:
              id: tuner_service_settings_station_sorting_option_alphanumerical_opt
              text: "Alphabetically"
          commands:
            - tapOn:
                id: tuner_service_settings_station_sorting_option_alphanumerical_opt
                text: "Alphabetically"
            - waitForAnimationToEnd
            - evalScript: ${output.sortSelectionApplied = true; output.sortAlphabetically = true}

- runFlow:
    when:
      true: ${output.sortAlphabetically != true}
    commands:
      - runFlow:
          when:
            visible:
              text: "Alphabetically"
          commands:
            - tapOn:
                text: "Alphabetically"
            - waitForAnimationToEnd
            - evalScript: ${output.sortSelectionApplied = true; output.sortAlphabetically = true}

- runFlow:
    when:
      true: ${output.sortAlphabetically != true}
    commands:
      - runFlow:
          when:
            visible:
              text: "Alphabetically"
          commands:
            - tapOn:
                point: "31%,49%"
            - waitForAnimationToEnd
            - evalScript: ${output.sortSelectionApplied = true; output.sortAlphabetically = true}

- runFlow:
    when:
      visible:
        text: "By frequency"
    commands:
      - pressKey: back

- runFlow:
    when:
      visible:
        text: "Default sorting"
    commands:
      - tapOn:
          text: "Default sorting"

- runFlow:
    when:
      visible:
        text: "Default Sorting"
    commands:
      - tapOn:
          text: "Default Sorting"

- runFlow:
    when:
      visible:
        text: "Sort available stations"
    commands:
      - tapOn:
          text: "Sort available stations"

- runFlow:
    when:
      visible:
        id: tuner_service_settings_station_sorting_option_alphanumerical_opt
        text: "Alphabetically"
        checked: true
    commands:
      - evalScript: ${output.sortStateObserved = true; output.sortAlphabetically = true}

- runFlow:
    when:
      true: ${output.sortStateObserved != true}
    commands:
      - runFlow:
          when:
            visible:
              id: tuner_service_settings_station_sorting_option_alphanumerical_opt
              text: "Alphabetically"
              selected: true
          commands:
            - evalScript: ${output.sortStateObserved = true; output.sortAlphabetically = true}

- runFlow:
    when:
      visible:
        text: "By frequency"
    commands:
      - pressKey: back

- assertTrue: ${output.sortAlphabetically == true}

# Close sorting chooser if it is still open.
- runFlow:
    when:
      visible:
        text: "By frequency"
    commands:
      - tapOn:
          text: "Sort available stations"
          optional: true
      - tapOn:
          point: "50%,27%"
          optional: true
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: "By frequency"
    commands:
      - pressKey: back
      - waitForAnimationToEnd

# 5) Radio info OFF: use switch state if exposed; fail if no state signal is detectable.
- evalScript: ${output.radioInfoDisabled = false; output.radioInfoStateObserved = false}

- runFlow:
    when:
      visible:
        id: tuner_service_settings_radio_info_opt
        checked: true
    commands:
      - evalScript: ${output.radioInfoStateObserved = true}
      - tapOn:
          id: tuner_service_settings_radio_info_opt
      - waitForAnimationToEnd

- runFlow:
    when:
      true: ${output.radioInfoStateObserved != true}
    commands:
      - runFlow:
          when:
            visible:
              id: tuner_service_settings_radio_info_opt
              selected: true
          commands:
            - evalScript: ${output.radioInfoStateObserved = true}
            - tapOn:
                id: tuner_service_settings_radio_info_opt
            - waitForAnimationToEnd

- runFlow:
    when:
      true: ${output.radioInfoStateObserved != true}
    commands:
      - runFlow:
          when:
            visible:
              id: tuner_service_settings_radio_info_opt
              text: "On"
          commands:
            - evalScript: ${output.radioInfoStateObserved = true}
            - tapOn:
                id: tuner_service_settings_radio_info_opt
            - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        id: tuner_service_settings_radio_info_opt
        checked: false
    commands:
      - evalScript: ${output.radioInfoStateObserved = true; output.radioInfoDisabled = true}

- runFlow:
    when:
      true: ${output.radioInfoDisabled != true}
    commands:
      - runFlow:
          when:
            visible:
              id: tuner_service_settings_radio_info_opt
              selected: false
          commands:
            - evalScript: ${output.radioInfoStateObserved = true; output.radioInfoDisabled = true}

- runFlow:
    when:
      true: ${output.radioInfoDisabled != true}
    commands:
      - runFlow:
          when:
            visible:
              id: tuner_service_settings_radio_info_opt
              text: "Off"
          commands:
            - evalScript: ${output.radioInfoStateObserved = true; output.radioInfoDisabled = true}

- runFlow:
    when:
      true: ${output.radioInfoStateObserved != true}
    commands:
      - runFlow:
          when:
            visible:
              text: "Radio info"
          commands:
            - tapOn:
                text: "Radio info"
                optional: true
            - waitForAnimationToEnd
            - evalScript: ${output.radioInfoStateObserved = true; output.radioInfoDisabled = true}

- assertTrue: ${output.radioInfoStateObserved == true}
- assertTrue: ${output.radioInfoDisabled == true}

# 6) Close Radio settings
- pressKey: back

# 7) Close Settings (if still present)
- runFlow:
    when:
      visible:
        id: media_app_auto_media_fullscreen_toggle_bt
    commands:
      - pressKey: back

- runFlow:
    when:
      visible:
        id: media_app_source_settings_bt
    commands:
      - pressKey: back

- extendedWaitUntil:
    visible:
      text: "All stations"
    timeout: 20000

- assertVisible:
    text: "All stations"
