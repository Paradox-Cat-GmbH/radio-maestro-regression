appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: Preconditions - Radio settings baseline (Leandro)
tags:
  - subflow
  - preconditions
  - radio
---
# Baseline from Radio (Leandro):
# 1) Open settings
# 2) Ensure Auto Media Fullscreen is OFF
# 3) Open Radio settings
# 4) Ensure sorting is Alphabetically
# 5) Ensure Radio info is OFF
# 6) Close Radio settings
# 7) Close Settings

- extendedWaitUntil:
    visible:
      text: "All stations"
    timeout: 20000

- evalScript: ${output.radioAppSettingsOpen = false; output.radioAppSettingsAttempt = 0}

- repeat:
    times: 4
    while:
      true: ${output.radioAppSettingsOpen != true}
    commands:
      - runFlow:
          when:
            visible:
              id: media_app_auto_media_fullscreen_toggle_bt
          commands:
            - evalScript: ${output.radioAppSettingsOpen = true}

      - runFlow:
          when:
            true: ${output.radioAppSettingsOpen != true}
          commands:
            - tapOn:
                id: com.bmwgroup.apinext.mediaapp:id/button_settings
                optional: true
            - tapOn:
                id: idx_icon_settings
                optional: true
            - runFlow:
                when:
                  true: ${output.radioAppSettingsAttempt >= 1}
                commands:
                  - tapOn:
                      point: "95%,16%"
                      optional: true
            - waitForAnimationToEnd
            - evalScript: ${output.radioAppSettingsAttempt = output.radioAppSettingsAttempt + 1}

- evalScript: ${output.radioHasFullscreenToggle = false}

- runFlow:
    when:
      visible:
        id: media_app_auto_media_fullscreen_toggle_bt
    commands:
      - evalScript: ${output.radioHasFullscreenToggle = true}

# 2) Fullscreen OFF
- runFlow:
    when:
      true: ${output.radioHasFullscreenToggle == true}
    commands:
      - assertVisible:
          text: "Switch automatically to full screen mode"
      - evalScript: ${output.fullscreenOff = false; output.fullscreenToggleAttempts = 0}

      - repeat:
          times: 3
          while:
            true: ${output.fullscreenOff != true}
          commands:
            - evalScript: ${output.fullscreenOn = false}

            - runFlow:
                when:
                  visible:
                    id: media_app_auto_media_fullscreen_toggle_bt
                    checked: true
                commands:
                  - evalScript: ${output.fullscreenOn = true}

            - runFlow:
                when:
                  visible:
                    id: media_app_auto_media_fullscreen_toggle_bt
                    selected: true
                commands:
                  - evalScript: ${output.fullscreenOn = true}

            - runFlow:
                when:
                  visible:
                    id: internal_idx_toggle_atom_glow_indicator
                commands:
                  - evalScript: ${output.fullscreenOn = true}

            - runFlow:
                when:
                  true: ${output.fullscreenOn == true}
                commands:
                  - evalScript: ${output.fullscreenToggleAttempts = output.fullscreenToggleAttempts + 1}
                  - runFlow:
                      when:
                        true: ${output.fullscreenToggleAttempts == 1}
                      commands:
                        - tapOn:
                            id: media_app_auto_media_fullscreen_toggle_bt
                            optional: true
                        - waitForAnimationToEnd
                  - runFlow:
                      when:
                        true: ${output.fullscreenToggleAttempts >= 2}
                      commands:
                        - tapOn:
                            point: "29%,51%"
                        - waitForAnimationToEnd

            - evalScript: ${output.fullscreenOnAfter = false}

            - runFlow:
                when:
                  visible:
                    id: media_app_auto_media_fullscreen_toggle_bt
                    checked: true
                commands:
                  - evalScript: ${output.fullscreenOnAfter = true}

            - runFlow:
                when:
                  visible:
                    id: media_app_auto_media_fullscreen_toggle_bt
                    selected: true
                commands:
                  - evalScript: ${output.fullscreenOnAfter = true}

            - runFlow:
                when:
                  visible:
                    id: internal_idx_toggle_atom_glow_indicator
                commands:
                  - evalScript: ${output.fullscreenOnAfter = true}

            - runFlow:
                when:
                  true: ${output.fullscreenOnAfter != true}
                commands:
                  - evalScript: ${output.fullscreenOff = true}

            - runFlow:
                when:
                  true: ${output.fullscreenOff != true}
                commands:
                  - waitForAnimationToEnd

      - assertTrue: ${output.fullscreenOff == true}

# 3) Open Radio settings
- evalScript: ${output.radioSettingsOpen = false}

- repeat:
    times: 3
    while:
      true: ${output.radioSettingsOpen != true}
    commands:
      - runFlow:
          when:
            visible:
              text: "Sort available stations"
          commands:
            - evalScript: ${output.radioSettingsOpen = true}

      - runFlow:
          when:
            visible:
              text: "Radio info"
          commands:
            - evalScript: ${output.radioSettingsOpen = true}

      - runFlow:
          when:
            true: ${output.radioSettingsOpen != true}
          commands:
            - tapOn:
                id: com.bmwgroup.apinext.mediaapp:id/source_settings
                optional: true
            - tapOn:
                id: media_app_source_settings_bt
                optional: true
            - tapOn:
                text: "Radio settings"
                optional: true
            - waitForAnimationToEnd

- assertTrue: ${output.radioSettingsOpen == true}

# 4) Sorting Alphabetically
- evalScript: ${output.sortAlphabetical = false}

- repeat:
    times: 3
    while:
      true: ${output.sortAlphabetical != true}
    commands:
      - tapOn:
          text: "Sort available stations"
          optional: true
      - waitForAnimationToEnd

      - tapOn:
          id: tuner_service_settings_station_sorting_option_alphanumerical_opt
          optional: true

      - tapOn:
          text: "Alphabetically"
          optional: true

      - runFlow:
          when:
            visible:
              text: "By frequency"
          commands:
            - tapOn:
                point: "31%,49%" # Rack fallback for "Alphabetically"
                optional: true
            - waitForAnimationToEnd
            - pressKey: back
            - waitForAnimationToEnd

      - runFlow:
          when:
            visible:
              text: "Sort available stations"
          commands:
            - assertVisible:
                text: "Alphabetically"
            - evalScript: ${output.sortAlphabetical = true}

- assertTrue: ${output.sortAlphabetical == true}

# 5) Radio info OFF
# Ensure sorting chooser does not block toggle checks.
- runFlow:
    when:
      visible:
        text: "By frequency"
    commands:
      - pressKey: back
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: "Public value"
    commands:
      - pressKey: back
      - waitForAnimationToEnd

- assertVisible:
    text: "Radio info"

# Radio info OFF (state from actual switch node in row)
# NOTE: On current IDC23 builds the traffic_information_toggle row carries checked=true/false.
- retry:
    maxRetries: 3
    commands:
      # If Radio info row contains checked=true, toggle it OFF
      - runFlow:
          when:
            visible:
              id: com.bmwgroup.apinext.tunermediaservice:id/traffic_information_toggle
              checked: true
          commands:
            - tapOn:
                id: com.bmwgroup.apinext.tunermediaservice:id/traffic_information_toggle
                optional: true
            - tapOn:
                id: com.bmwgroup.apinext.tunermediaservice:id/button_icon
                optional: true
            - waitForAnimationToEnd

      # fallback tap on known switch area if still ON
      - runFlow:
          when:
            visible:
              id: com.bmwgroup.apinext.tunermediaservice:id/traffic_information_toggle
              checked: true
          commands:
            - tapOn:
                point: "65%,34%"
                optional: true
            - waitForAnimationToEnd

      # must end with no checked=true in Radio info row
      - assertNotVisible:
          id: com.bmwgroup.apinext.tunermediaservice:id/traffic_information_toggle
          checked: true

# 6) Close Radio settings
- pressKey: back

# 7) Close Settings (if still present)
- runFlow:
    when:
      visible:
        id: media_app_auto_media_fullscreen_toggle_bt
    commands:
      - pressKey: back

- runFlow:
    when:
      visible:
        id: media_app_source_settings_bt
    commands:
      - pressKey: back

- runFlow:
    when:
      visible:
        text: "Switch automatically to full screen mode"
    commands:
      - pressKey: back

- extendedWaitUntil:
    visible:
      text: "All stations"
    timeout: 20000

- assertVisible:
    text: "All stations"
