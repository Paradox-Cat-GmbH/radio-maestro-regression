appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: Preconditions - Radio settings baseline (Leandro)
tags:
  - subflow
  - preconditions
  - radio
---
# Baseline from Radio (Leandro):
# 1) Open settings
# 2) Ensure Auto Media Fullscreen is OFF
# 3) Open Radio settings
# 4) Ensure sorting is Alphabetically
# 5) Ensure Radio info is OFF
# 6) Close Radio settings
# 7) Close Settings

- extendedWaitUntil:
    visible:
      text: "All stations"
    timeout: 20000

- tapOn:
    id: idx_icon_settings

- extendedWaitUntil:
    visible:
      id: media_app_auto_media_fullscreen_toggle_bt
    timeout: 20000

# 2) Fullscreen OFF
- assertVisible:
    text: "Switch automatically to full screen mode"

- evalScript: ${output.fullscreenOff = false; output.fullscreenToggleAttempts = 0}

- repeat:
    times: 3
    while:
      true: ${output.fullscreenOff != true}
    commands:
      - evalScript: ${output.fullscreenOn = false}

      - runFlow:
          when:
            visible:
              id: media_app_auto_media_fullscreen_toggle_bt
              checked: true
          commands:
            - evalScript: ${output.fullscreenOn = true}

      - runFlow:
          when:
            visible:
              id: media_app_auto_media_fullscreen_toggle_bt
              selected: true
          commands:
            - evalScript: ${output.fullscreenOn = true}

      - runFlow:
          when:
            visible:
              id: internal_idx_toggle_atom_glow_indicator
          commands:
            - evalScript: ${output.fullscreenOn = true}

      - runFlow:
          when:
            true: ${output.fullscreenOn == true}
          commands:
            - evalScript: ${output.fullscreenToggleAttempts = output.fullscreenToggleAttempts + 1}
            - runFlow:
                when:
                  true: ${output.fullscreenToggleAttempts == 1}
                commands:
                  - tapOn:
                      id: media_app_auto_media_fullscreen_toggle_bt
                      optional: true
                  - waitForAnimationToEnd
            - runFlow:
                when:
                  true: ${output.fullscreenToggleAttempts >= 2}
                commands:
                  - tapOn:
                      point: "29%,51%"
                  - waitForAnimationToEnd

      - evalScript: ${output.fullscreenOnAfter = false}

      - runFlow:
          when:
            visible:
              id: media_app_auto_media_fullscreen_toggle_bt
              checked: true
          commands:
            - evalScript: ${output.fullscreenOnAfter = true}

      - runFlow:
          when:
            visible:
              id: media_app_auto_media_fullscreen_toggle_bt
              selected: true
          commands:
            - evalScript: ${output.fullscreenOnAfter = true}

      - runFlow:
          when:
            visible:
              id: internal_idx_toggle_atom_glow_indicator
          commands:
            - evalScript: ${output.fullscreenOnAfter = true}

      - runFlow:
          when:
            true: ${output.fullscreenOnAfter != true}
          commands:
            - evalScript: ${output.fullscreenOff = true}

      - runFlow:
          when:
            true: ${output.fullscreenOff != true}
          commands:
            - waitForAnimationToEnd

- assertTrue: ${output.fullscreenOff == true}

# 3) Open Radio settings
- evalScript: ${output.radioSettingsOpen = false}

- repeat:
    times: 3
    while:
      true: ${output.radioSettingsOpen != true}
    commands:
      - runFlow:
          when:
            visible:
              text: "Sort available stations"
          commands:
            - evalScript: ${output.radioSettingsOpen = true}

      - runFlow:
          when:
            visible:
              id: tuner_service_settings_radio_info_opt
          commands:
            - evalScript: ${output.radioSettingsOpen = true}

      - runFlow:
          when:
            visible:
              text: "Radio info"
          commands:
            - evalScript: ${output.radioSettingsOpen = true}

      - runFlow:
          when:
            true: ${output.radioSettingsOpen != true}
          commands:
            - tapOn:
                id: media_app_source_settings_bt
                optional: true
            - tapOn:
                text: "Radio settings"
                optional: true
            - waitForAnimationToEnd

- assertTrue: ${output.radioSettingsOpen == true}

# 4) Sorting Alphabetically
- evalScript: ${output.sortAlphabetical = false}

- repeat:
    times: 3
    while:
      true: ${output.sortAlphabetical != true}
    commands:
      - tapOn:
          text: "Sort available stations"
          optional: true
      - waitForAnimationToEnd

      - tapOn:
          id: tuner_service_settings_station_sorting_option_alphanumerical_opt
          optional: true

      - tapOn:
          text: "Alphabetically"
          optional: true

      - runFlow:
          when:
            visible:
              text: "By frequency"
          commands:
            - tapOn:
                point: "31%,49%" # Rack fallback for "Alphabetically"
                optional: true
            - waitForAnimationToEnd
            - pressKey: back
            - waitForAnimationToEnd

      - runFlow:
          when:
            visible:
              text: "Sort available stations"
          commands:
            - assertVisible:
                text: "Alphabetically"
            - evalScript: ${output.sortAlphabetical = true}

- assertTrue: ${output.sortAlphabetical == true}

# 5) Radio info OFF
# Ensure sorting chooser does not block toggle checks.
- runFlow:
    when:
      visible:
        text: "By frequency"
    commands:
      - pressKey: back
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: "Public value"
    commands:
      - pressKey: back
      - waitForAnimationToEnd

- assertVisible:
    id: tuner_service_settings_radio_info_opt

# Mirror fullscreen strategy: detect ON, toggle by ID, re-check until OFF.
- evalScript: ${output.radioInfoOff = false; output.radioInfoOn = false; output.radioInfoToggleAttempts = 0; output.radioInfoSignalKnown = false}

- repeat:
    times: 4
    while:
      true: ${output.radioInfoOff != true}
    commands:
      - evalScript: ${output.radioInfoOn = false}

      - runFlow:
          when:
            visible:
              id: tuner_service_settings_radio_info_opt
              checked: true
          commands:
            - evalScript: ${output.radioInfoOn = true; output.radioInfoSignalKnown = true}

      - runFlow:
          when:
            visible:
              id: tuner_service_settings_radio_info_opt
              selected: true
          commands:
            - evalScript: ${output.radioInfoOn = true; output.radioInfoSignalKnown = true}

      - runFlow:
          when:
            true: ${output.radioInfoOn == true}
          commands:
            - evalScript: ${output.radioInfoToggleAttempts = output.radioInfoToggleAttempts + 1}
            - tapOn:
                id: tuner_service_settings_radio_info_opt
                retryTapIfNoChange: true
            - waitForAnimationToEnd

      # If ON was not explicitly detected, do one probe tap before concluding OFF.
      - runFlow:
          when:
            true: ${output.radioInfoOn != true && output.radioInfoToggleAttempts == 0}
          commands:
            - evalScript: ${output.radioInfoToggleAttempts = output.radioInfoToggleAttempts + 1; output.radioInfoSignalKnown = true}
            - tapOn:
                id: tuner_service_settings_radio_info_opt
                retryTapIfNoChange: true
            - waitForAnimationToEnd

      - evalScript: ${output.radioInfoOnAfter = false; output.radioInfoOffAfter = false}

      - runFlow:
          when:
            visible:
              id: tuner_service_settings_radio_info_opt
              checked: true
          commands:
            - evalScript: ${output.radioInfoOnAfter = true; output.radioInfoSignalKnown = true}

      - runFlow:
          when:
            visible:
              id: tuner_service_settings_radio_info_opt
              selected: true
          commands:
            - evalScript: ${output.radioInfoOnAfter = true; output.radioInfoSignalKnown = true}

      - runFlow:
          when:
            true: ${output.radioInfoOnAfter != true && output.radioInfoToggleAttempts > 0}
          commands:
            - evalScript: ${output.radioInfoOff = true}

      - runFlow:
          when:
            true: ${output.radioInfoOff != true}
          commands:
            - waitForAnimationToEnd

- assertTrue: ${output.radioInfoSignalKnown == true}
- assertTrue: ${output.radioInfoOff == true}

# 6) Close Radio settings
- pressKey: back

# 7) Close Settings (if still present)
- runFlow:
    when:
      visible:
        id: media_app_auto_media_fullscreen_toggle_bt
    commands:
      - pressKey: back

- runFlow:
    when:
      visible:
        id: media_app_source_settings_bt
    commands:
      - pressKey: back

- extendedWaitUntil:
    visible:
      text: "All stations"
    timeout: 20000

- assertVisible:
    text: "All stations"
