appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: Open Source selector
tags:
  - subflow
  - radio
---
# In Media surface, the "Source" entry is present under Media.
# Prefer the stable id from Inspect Screen.
- tapOn:
    id: media_app_source_selector_lb
    text: Source
    optional: true

# Fallbacks (text-only, build dependent)
- tapOn:
    text: "Source"
    optional: true
- tapOn:
    text: "Sources"
    optional: true
