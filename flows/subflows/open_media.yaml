appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: "Open Media surface (Home -> Media DET)"
tags:
  - helper
  - subflow
  - media
---
# Step 1: Go Home (touch + key fallback)
- pressKey: home
- tapOn:
    id: IconicBar.Det.Home
    optional: true

# Step 2: Tap Media DET (touch, then SWAG fallback via host control server)
- runFlow: ../subflows/tap_media_det.yaml
