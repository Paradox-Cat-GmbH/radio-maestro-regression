appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: Tap Media DET
tags:
  - helper
  - subflow
  - media
---
# Single tap on the bottom bar Media entry (DET).
# IDC23 exposes the footer DET icons through overlay resource IDs.
- runFlow: ../idc23/subflows/common/dismiss_media_popup_if_present_idc23.yaml
- runFlow:
    when:
      visible:
        id: "com.bmwgroup.idnext.overlay:id/mediaIcon"
    commands:
      - tapOn:
          id: "com.bmwgroup.idnext.overlay:id/mediaIcon"
- runFlow:
    when:
      notVisible:
        id: "com.bmwgroup.idnext.overlay:id/mediaIcon"
    commands:
      - runFlow:
          when:
            visible:
              id: IconicBar.Det.Media
          commands:
            - tapOn:
                id: IconicBar.Det.Media
      - runFlow:
          when:
            visible:
              text: Media
          commands:
            - tapOn:
                text: Media
- runFlow: ../idc23/subflows/common/dismiss_media_popup_if_present_idc23.yaml
