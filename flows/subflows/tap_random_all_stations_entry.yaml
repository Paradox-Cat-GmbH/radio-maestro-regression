      - runFlow:
          when:
            visible:
              id: "ListlmageComponent ImageRightlcon"
              index: 2
          commands:
            - tapOn:
                id: "ListlmageComponent ImageRightlcon"
                index: 2
                retryTapIfNoChange: true
            - evalScript: ${output.stationTapped = true}

- runFlow:
    when:
      true: ${output.randStationIndex == 3}
    commands:
      - runFlow:
          when:
            visible:
              id: "ListImageComponent ImageRightIcon"
              index: 3
          commands:
            - tapOn:
                id: "ListImageComponent ImageRightIcon"
                index: 3
                retryTapIfNoChange: true
            - evalScript: ${output.stationTapped = true}
      - runFlow:
          when:
            visible:
              id: "ListlmageComponent ImageRightlcon"
              index: 3
          commands:
            - tapOn:
                id: "ListlmageComponent ImageRightlcon"
                index: 3
                retryTapIfNoChange: true
            - evalScript: ${output.stationTapped = true}

- runFlow:
    when:
      true: ${output.randStationIndex == 4}
    commands:
      - runFlow:
          when:
            visible:
              id: "ListImageComponent ImageRightIcon"
              index: 4
          commands:
            - tapOn:
                id: "ListImageComponent ImageRightIcon"
                index: 4
                retryTapIfNoChange: true
            - evalScript: ${output.stationTapped = true}
      - runFlow:
          when:
            visible:
              id: "ListlmageComponent ImageRightlcon"
              index: 4
          commands:
