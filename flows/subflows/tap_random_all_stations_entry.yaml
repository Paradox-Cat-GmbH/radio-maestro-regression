appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: Tap random station from All stations (label-primary, index-fallback)
tags:
  - subflow
  - radio
  - station_select
---
- extendedWaitUntil:
    visible:
      id: "ListImageComponent ImageRightIcon"
      index: 0
    timeout: 20000

- evalScript: "${output.stationTapped = false; output._scrollCount = 0; output._labelScrollCount = 0; output.stationTarget = (typeof MAESTRO_STATION_TARGET !== 'undefined' ? String(MAESTRO_STATION_TARGET).trim() : '')}"

# Primary path: if a station label/frequency is provided, scroll until visible and tap by text.
- repeat:
    times: 10
    while:
      true: ${output.stationTapped != true && output.stationTarget.length > 0 && output._labelScrollCount < 10}
    commands:
      - runFlow:
          when:
            visible: "${output.stationTarget}"
          commands:
            - tapOn: "${output.stationTarget}"
            - evalScript: ${output.stationTapped = true}
      - runFlow:
          when:
            true: ${output.stationTapped != true}
          commands:
            - swipe:
                start: "70%,78%"
                end: "70%,32%"
                duration: 450
            - waitForAnimationToEnd
            - evalScript: ${output._labelScrollCount = output._labelScrollCount + 1}

# Fallback path: deterministic index selection (safe for current 5-row viewport).
- repeat:
    times: 5
    while:
      true: ${output.stationTapped != true && output._scrollCount < (output.randStationScrolls || 0)}
    commands:
      - swipe:
          start: "70%,78%"
          end: "70%,32%"
          duration: 450
      - waitForAnimationToEnd
      - evalScript: ${output._scrollCount = output._scrollCount + 1}

- runFlow:
    when:
      true: ${output.stationTapped != true && output.randStationIndex == 0}
    commands:
      - runFlow:
          when:
            visible:
              id: "ListImageComponent ImageRightIcon"
              index: 0
          commands:
            - tapOn:
                id: "ListImageComponent ImageRightIcon"
                index: 0
                retryTapIfNoChange: true
            - evalScript: ${output.stationTapped = true}

- runFlow:
    when:
      true: ${output.stationTapped != true && output.randStationIndex == 1}
    commands:
      - runFlow:
          when:
            visible:
              id: "ListImageComponent ImageRightIcon"
              index: 1
          commands:
            - tapOn:
                id: "ListImageComponent ImageRightIcon"
                index: 1
                retryTapIfNoChange: true
            - evalScript: ${output.stationTapped = true}

- runFlow:
    when:
      true: ${output.stationTapped != true && output.randStationIndex == 2}
    commands:
      - runFlow:
          when:
            visible:
              id: "ListImageComponent ImageRightIcon"
              index: 2
          commands:
            - tapOn:
                id: "ListImageComponent ImageRightIcon"
                index: 2
                retryTapIfNoChange: true
            - evalScript: ${output.stationTapped = true}

- runFlow:
    when:
      true: ${output.stationTapped != true && output.randStationIndex == 3}
    commands:
      - runFlow:
          when:
            visible:
              id: "ListImageComponent ImageRightIcon"
              index: 3
          commands:
            - tapOn:
                id: "ListImageComponent ImageRightIcon"
                index: 3
                retryTapIfNoChange: true
            - evalScript: ${output.stationTapped = true}

- runFlow:
    when:
      true: ${output.stationTapped != true && output.randStationIndex == 4}
    commands:
      - runFlow:
          when:
            visible:
              id: "ListImageComponent ImageRightIcon"
              index: 4
          commands:
            - tapOn:
                id: "ListImageComponent ImageRightIcon"
                index: 4
                retryTapIfNoChange: true
            - evalScript: ${output.stationTapped = true}

# Last fallback to keep flow deterministic.
- runFlow:
    when:
      true: ${output.stationTapped != true}
    commands:
      - runFlow:
          when:
            visible:
              id: "ListImageComponent ImageRightIcon"
              index: 0
          commands:
            - tapOn:
                id: "ListImageComponent ImageRightIcon"
                index: 0
                retryTapIfNoChange: true
            - evalScript: ${output.stationTapped = true}

- assertTrue: ${output.stationTapped == true}
