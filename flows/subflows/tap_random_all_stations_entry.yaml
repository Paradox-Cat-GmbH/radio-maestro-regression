appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: Tap random station from All stations (index-branch safe)
tags:
  - subflow
  - radio
  - station_select
---
- extendedWaitUntil:
    visible:
      id: "ListImageComponent ImageRightIcon"
      index: 0
    timeout: 20000

- evalScript: ${output.stationTapped = false}

- runFlow:
    when:
      true: ${output.randStationIndex == 0}
    commands:
      - runFlow:
          when:
            visible:
              id: "ListImageComponent ImageRightIcon"
              index: 0
          commands:
            - tapOn:
                id: "ListImageComponent ImageRightIcon"
                index: 0
                retryTapIfNoChange: true
            - evalScript: ${output.stationTapped = true}
      - runFlow:
          when:
            visible:
              id: "ListlmageComponent ImageRightlcon"
              index: 0
          commands:
            - tapOn:
                id: "ListlmageComponent ImageRightlcon"
                index: 0
                retryTapIfNoChange: true
            - evalScript: ${output.stationTapped = true}

- runFlow:
    when:
      true: ${output.randStationIndex == 1}
    commands:
      - runFlow:
          when:
            visible:
              id: "ListImageComponent ImageRightIcon"
              index: 1
          commands:
            - tapOn:
                id: "ListImageComponent ImageRightIcon"
                index: 1
                retryTapIfNoChange: true
            - evalScript: ${output.stationTapped = true}
      - runFlow:
          when:
            visible:
              id: "ListlmageComponent ImageRightlcon"
              index: 1
          commands:
            - tapOn:
                id: "ListlmageComponent ImageRightlcon"
                index: 1
                retryTapIfNoChange: true
            - evalScript: ${output.stationTapped = true}

- runFlow:
    when:
      true: ${output.randStationIndex == 2}
    commands:
