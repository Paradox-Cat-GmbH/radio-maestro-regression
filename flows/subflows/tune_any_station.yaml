# Ensures Radio is actively tuned by selecting a RANDOM station in the list (bounded).
# Rationale: Avoid hardcoding index:0 across runs; improve coverage while remaining stable.
# Random selection is bounded to avoid out-of-range issues on flaky racks.
#
# Override bound with env var MAESTRO_RAND_MAX_INDEX (default 3).

appId: com.bmwgroup.idnext.launcher
---
- assertVisible:
    text: "Radio"
- tapOn:
    text: "All stations"
- waitForAnimationToEnd

- evalScript: "${const max = parseInt(env.MAESTRO_RAND_MAX_INDEX || '3', 10); const idx = Math.floor(Math.random() * (max + 1)); output.randStationIndex = idx; output.randStationSelector = { id: 'ListImageComponent ImageRightIcon', index: idx, retryTapIfNoChange: true }; }"
- tapOn: ${output.randStationSelector}
- waitForAnimationToEnd
