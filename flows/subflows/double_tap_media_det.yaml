appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: Double tap Media DET
tags:
  - helper
  - subflow
  - media
---
# IDC23 exposes the footer DET icons through overlay resource IDs.
- runFlow:
    when:
      visible:
        id: "com.bmwgroup.idnext.overlay:id/mediaIcon"
    commands:
      - doubleTapOn:
          id: "com.bmwgroup.idnext.overlay:id/mediaIcon"
- runFlow:
    when:
      notVisible:
        id: "com.bmwgroup.idnext.overlay:id/mediaIcon"
    commands:
      - runFlow:
          when:
            visible:
              id: IconicBar.Det.Media
          commands:
            - doubleTapOn:
                id: IconicBar.Det.Media
      - runFlow:
          when:
            visible:
              text: Media
          commands:
            - doubleTapOn:
                text: Media
