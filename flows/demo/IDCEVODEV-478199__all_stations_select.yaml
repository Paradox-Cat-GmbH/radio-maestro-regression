appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: IDCEVODEV-478199 - All stations list - select station
tags:
  - demo
  - radio
  - ui_only
---
- evalScript: "${output.testId = 'IDCEVODEV-478199'}"
# Step 1: Ensure Radio source is active
- runFlow: ../subflows/ensure_radio_source.yaml

# Step 2: Apply deterministic Radio preconditions from Settings
- runFlow: ../subflows/preconditions_radio_settings.yaml

# Step 3: Open All stations list and tune a bounded random station
- runFlow: ../subflows/open_all_stations.yaml

- runScript:
    file: ../../scripts/maestro/pick_random_station.js
    env:
      RAND_MAX: 5

- runFlow: ../subflows/tap_random_all_stations_entry.yaml

- runFlow: ../subflows/verify_radio_backend.yaml
