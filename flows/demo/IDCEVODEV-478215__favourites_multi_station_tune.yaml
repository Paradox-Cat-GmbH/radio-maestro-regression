appId: com.bmwgroup.idnext.launcher
name: IDCEVODEV-478215 — Favourites — tune when >1 favourites exist
tags: [demo, radio, favourites, requires_setup]
---
- evalScript: "${output.testId = 'IDCEVODEV-478215'}"
- runFlow: ../subflows/open_media.yaml
- runFlow: ../subflows/open_all_stations.yaml

# Precondition setup (best-effort):
# Add two stations to favourites via long press (replace names if your list differs).
- longPressOn:
    id: ListImageComponent ImageRightIcon
    index: 0
- waitForAnimationToEnd
- tapOn: Add to favourites

- longPressOn:
    id: ListImageComponent ImageRightIcon
    index: 3
- waitForAnimationToEnd
- tapOn: Add to favourites

# TODO: Gotta make it more robust and do an if: if the radio is already in Favorite, then just either get oout of the screen or then "Remove from favourites" and then add back "Add to favourites" so it doesn't fail and always passes and does the steps and is failproof for any situation or instance

- runFlow: ../subflows/open_favourites.yaml

# Tune one favourite.
- tapOn: "089Kult"
- waitForAnimationToEnd
- runFlow: ../subflows/verify_radio_backend.yaml
