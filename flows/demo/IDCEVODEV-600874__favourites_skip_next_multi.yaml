appId: com.bmwgroup.idnext.launcher
name: IDCEVODEV-600874 - Favourites - skip to next station when 1_plus favourites exist
tags: [demo, radio, favourites, requires_setup, keyevent_first]
---
- evalScript: "${output.testId = 'IDCEVODEV-600874'}"
- runFlow: ../subflows/open_media.yaml
- runFlow: ../subflows/open_favourites.yaml

# Precondition: favourites contains >1 station.
# If not, add at least two favourites (see IDCEVODEV-478215 flow).

# Use media key event as the most stable "skip next" action on racks.
- pressKey: "remote media next"
- waitForAnimationToEnd
- runFlow: ../subflows/verify_radio_backend.yaml
