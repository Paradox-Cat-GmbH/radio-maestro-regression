appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: IDCEVODEV-478216 - Favourites - tune when only 1 favourite exists
tags:
  - demo
  - radio
  - favourites
  - requires_setup
---
- evalScript: "${output.testId = 'IDCEVODEV-478216'}"
- runFlow: ../subflows/open_all_stations.yaml

# Precondition setup (best-effort):
# Ensure ONLY ONE favourite exists. If your environment already has multiple favourites, clear them manually first.
# Add one station to favourites via long press (replace station name if needed).
- longPressOn: "089Kult"
- waitForAnimationToEnd

- runFlow: ../subflows/open_favourites.yaml

# Tune the single favourite.
- tapOn: "089Kult"
- waitForAnimationToEnd
# Expected (PDF): with only 1 favourite, skip next/prev within favourites is not shown.
# (We do not assert UI absence here to keep it stable across builds.)
- runFlow: ../subflows/verify_radio_backend.yaml
