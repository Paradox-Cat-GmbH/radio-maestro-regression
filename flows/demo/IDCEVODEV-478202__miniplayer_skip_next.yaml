appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: IDCEVODEV-478202 - Mediaminiplayer - skip to next station
tags:
  - demo
  - radio
  - ui_only
---
- evalScript: "${output.testId = 'IDCEVODEV-478202'}"
- runFlow: ../subflows/ensure_radio_source.yaml
# Precondition: Radio is the active source and the mini player is visible
- extendedWaitUntil:
    visible:
      id: "miniplayer_control"
    timeout: 20000
- tapOn:
    id: "idx_icon_forward"
- waitForAnimationToEnd
- runFlow: ../subflows/verify_radio_backend.yaml
