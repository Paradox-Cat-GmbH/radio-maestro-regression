appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: SMOKE - Open Media then backend check
tags:
  - smoke
---
- evalScript: "${if (!output.stamp) { var d=new Date(); function p(n){ n=String(n); return (n.length<2)?('0'+n):n; } output.stamp=''+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'_'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds()); } output.testId='smoke_open_media_backend_check'; }"
- runFlow: ../subflows/ensure_radio_source.yaml
- runFlow: "../subflows/verify_radio_backend.yaml"
