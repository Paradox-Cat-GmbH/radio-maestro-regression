appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: SMOKE - EDIABAS STR via JS pydiabas sidecar
tags:
  - smoke
  - ediabas
  - str

---
- evalScript: "${output.testId = 'smoke_ediabas_str_sidecar'}"
- pressKey: home
# - waitForAnimationToEnd
- runFlow:
    file: ../subflows/ediabas_str_prep_backend.yaml
    env:
      TEST_ID: smoke_ediabas_str_sidecar_prep
      PREP_ENABLED: "true"
      PREP_REBOOT: "true"
      PREP_TIMEOUT_SECONDS: "30"
      PREP_POST_REBOOT_DELAY_SECONDS: "35"
      PREP_BEFORE_SHELL: "setprop persist.vendor.com.bmwgroup.disable_cid_ehh true||setprop persist.vendor.com.bmwgroup.disable_phud_ehh true"
      PREP_AFTER_SHELL: "getprop persist.vendor.com.bmwgroup.disable_cid_ehh||getprop persist.vendor.com.bmwgroup.disable_phud_ehh"
- runFlow:
    file: ../subflows/ediabas_str_sidecar_backend.yaml
    env:
      TEST_ID: smoke_ediabas_str_sidecar
      STR_SECONDS: "180"
      SETTLE_SECONDS: "5"
      TIMEOUT_SECONDS: "90"
      RETRIES: "1"
      ECU: IPB_APP1
      JOB: STEUERN_ROUTINE
      ARGPAD: ARG;ZUSTAND_FAHRZEUG;STR;0x07
      ARGWOHNEN: ARG;ZUSTAND_FAHRZEUG;STR;0x05
      ARGPARKING: ARG;ZUSTAND_FAHRZEUG;STR;0x01
      WAIT_AFTER_PAD_INITIAL_SECONDS: "0"
      WAIT_AFTER_WOHNEN_ENTER_SECONDS: "10"
      WAIT_AFTER_PARKING_COMMAND_SECONDS: "0"
      WAIT_AFTER_WOHNEN_RETURN_SECONDS: "20"
      WAIT_AFTER_PAD_RETURN_SECONDS: "40"
      SKIP_INITIAL_PAD: "true"
      PRE1_ECU: IDCEVO25
      PRE1_JOB: STEUERN_ROUTINE
      PRE1_ARG: ARG;DISABLE_POSTPONE_SHUTDOWN;STR;0x01
      PRE1_WAIT_SECONDS: "10"
      PRE2_ECU: IPB_APP2
      PRE2_JOB: STEUERN_ROUTINE
      PRE2_ARG: ARG;TEILNETZ_MASTER;STR;00000000;0000
      PRE2_WAIT_SECONDS: "5"
