appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: IDC23 - Tap random station from All stations
tags:
  - idc23
  - subflow
  - radio
  - station_select
---
- runFlow: dismiss_media_popup_if_present_idc23.yaml
- evalScript: "${output.stationTapped = false; output._scrollCount = 0; output._labelScrollCount = 0; output.stationTarget = (typeof MAESTRO_STATION_TARGET !== 'undefined' ? String(MAESTRO_STATION_TARGET).trim() : ''); output.stationSelectorId = ''}"

- extendedWaitUntil:
    visible:
      id: "com.bmwgroup.apinext.mediaapp:id/cl_one_line_list"
      index: 0
    timeout: 12000
    optional: true

- runFlow:
    when:
      visible:
        id: "com.bmwgroup.apinext.mediaapp:id/cl_one_line_list"
        index: 0
    commands:
      - evalScript: ${output.stationSelectorId = 'com.bmwgroup.apinext.mediaapp:id/cl_one_line_list'}

- runFlow:
    when:
      true: ${output.stationSelectorId == ''}
    commands:
      - extendedWaitUntil:
          visible:
            id: "com.bmwgroup.apinext.mediaapp:id/item_arrow"
            index: 0
          timeout: 8000
          optional: true
      - runFlow:
          when:
            visible:
              id: "com.bmwgroup.apinext.mediaapp:id/item_arrow"
              index: 0
          commands:
            - evalScript: ${output.stationSelectorId = 'com.bmwgroup.apinext.mediaapp:id/item_arrow'}

- assertTrue: ${output.stationSelectorId != ''}

# Primary path: if a station label/frequency is provided, scroll until visible and tap by text.
- repeat:
    times: 10
    while:
      true: ${output.stationTapped != true && output.stationTarget.length > 0 && output._labelScrollCount < 10}
    commands:
      - runFlow:
          when:
            visible: "${output.stationTarget}"
          commands:
            - tapOn: "${output.stationTarget}"
            - evalScript: ${output.stationTapped = true}
      - runFlow:
          when:
            true: ${output.stationTapped != true}
          commands:
            - swipe:
                start: "30%,78%"
                end: "30%,32%"
                duration: 450
            - waitForAnimationToEnd
            - evalScript: ${output._labelScrollCount = output._labelScrollCount + 1}

# Fallback path: deterministic index selection from the current IDC23 row container.
- repeat:
    times: 5
    while:
      true: ${output.stationTapped != true && output._scrollCount < (output.randStationScrolls || 0)}
    commands:
      - swipe:
          start: "30%,78%"
          end: "30%,32%"
          duration: 450
      - waitForAnimationToEnd
      - evalScript: ${output._scrollCount = output._scrollCount + 1}

- runFlow:
    when:
      true: ${output.stationTapped != true && output.randStationIndex == 0}
    commands:
      - tapOn:
          id: "${output.stationSelectorId}"
          index: 0
          retryTapIfNoChange: true
      - evalScript: ${output.stationTapped = true}

- runFlow:
    when:
      true: ${output.stationTapped != true && output.randStationIndex == 1}
    commands:
      - tapOn:
          id: "${output.stationSelectorId}"
          index: 1
          retryTapIfNoChange: true
      - evalScript: ${output.stationTapped = true}

- runFlow:
    when:
      true: ${output.stationTapped != true && output.randStationIndex == 2}
    commands:
      - tapOn:
          id: "${output.stationSelectorId}"
          index: 2
          retryTapIfNoChange: true
      - evalScript: ${output.stationTapped = true}

- runFlow:
    when:
      true: ${output.stationTapped != true && output.randStationIndex == 3}
    commands:
      - tapOn:
          id: "${output.stationSelectorId}"
          index: 3
          retryTapIfNoChange: true
      - evalScript: ${output.stationTapped = true}

- runFlow:
    when:
      true: ${output.stationTapped != true && output.randStationIndex == 4}
    commands:
      - tapOn:
          id: "${output.stationSelectorId}"
          index: 4
          retryTapIfNoChange: true
      - evalScript: ${output.stationTapped = true}

- runFlow:
    when:
      true: ${output.stationTapped != true}
    commands:
      - tapOn:
          id: "${output.stationSelectorId}"
          index: 0
          retryTapIfNoChange: true
      - evalScript: ${output.stationTapped = true}

- assertTrue: ${output.stationTapped == true}
