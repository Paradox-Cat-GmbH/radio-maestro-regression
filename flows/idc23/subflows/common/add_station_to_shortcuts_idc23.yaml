appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: IDC23 - Add station to shortcuts with duplicate retry
tags:
  - idc23
  - subflow
  - radio
  - shortcuts
---
- runFlow: dismiss_media_popup_if_present_idc23.yaml

- evalScript: "${output.idc23ShortcutStartIndex = (typeof STATION_INDEX !== 'undefined' ? parseInt(String(STATION_INDEX), 10) : 0); if (isNaN(output.idc23ShortcutStartIndex) || output.idc23ShortcutStartIndex < 0) output.idc23ShortcutStartIndex = 0; output.idc23ShortcutMaxIndex = (typeof MAX_STATION_INDEX !== 'undefined' ? parseInt(String(MAX_STATION_INDEX), 10) : 14); if (isNaN(output.idc23ShortcutMaxIndex) || output.idc23ShortcutMaxIndex < output.idc23ShortcutStartIndex) output.idc23ShortcutMaxIndex = 14; output.idc23ShortcutOptional = ((typeof SHORTCUT_OPTIONAL !== 'undefined' && String(SHORTCUT_OPTIONAL).toLowerCase() == 'true') || (typeof STATION_OPTIONAL !== 'undefined' && String(STATION_OPTIONAL).toLowerCase() == 'true')); output.idc23ShortcutAdded = false; output.idc23ShortcutDuplicateSeen = false; output.idc23ShortcutAddedIndex = -1; output.idc23ShortcutAttemptIndex = output.idc23ShortcutStartIndex;}"

- repeat:
    times: 20
    while:
      true: ${output.idc23ShortcutAdded != true && output.idc23ShortcutAttemptIndex <= output.idc23ShortcutMaxIndex}
    commands:
      - runFlow: dismiss_media_popup_if_present_idc23.yaml
      - evalScript: ${output.idc23ShortcutDuplicateSeen = false}
      - runFlow:
          file: long_press_station_entry_idc23.yaml
          env:
            STATION_INDEX: "${output.idc23ShortcutAttemptIndex}"
            STATION_OPTIONAL: "${output.idc23ShortcutOptional}"
      - waitForAnimationToEnd
      - runFlow:
          when:
            true: ${output.idc23ShortcutAdded != true}
          commands:
            - extendedWaitUntil:
                visible:
                  text: "Add to shortcuts"
                timeout: 1200
                optional: true
      - runFlow:
          when:
            true: ${output.idc23ShortcutAdded != true}
          commands:
            - extendedWaitUntil:
                visible:
                  id: "com.bmwgroup.apinext.mediaapp:id/item_label"
                  text: "Shortcut has already been added."
                timeout: 1200
                optional: true

      - runFlow:
          when:
            visible:
              text: "Add to shortcuts"
          commands:
            - tapOn:
                text: "Add to shortcuts"
                retryTapIfNoChange: true
            - waitForAnimationToEnd
            - evalScript: ${output.idc23ShortcutAdded = true; output.idc23ShortcutAddedIndex = output.idc23ShortcutAttemptIndex}

      - runFlow:
          when:
            true: ${output.idc23ShortcutAdded != true}
          commands:
            - runFlow:
                when:
                  visible:
                    id: "com.bmwgroup.apinext.mediaapp:id/item_label"
                    text: "Shortcut has already been added."
                commands:
                  - evalScript: ${output.idc23ShortcutDuplicateSeen = true}
                  - pressKey: back
                  - waitForAnimationToEnd

      - runFlow:
          when:
            true: ${output.idc23ShortcutAdded != true && output.idc23ShortcutDuplicateSeen != true && output.idc23ShortcutOptional != true}
          commands:
            - assertVisible:
                text: "Add to shortcuts"

      - runFlow:
          when:
            true: ${output.idc23ShortcutAdded != true && output.idc23ShortcutDuplicateSeen == true}
          commands:
            - evalScript: ${output.idc23ShortcutAttemptIndex = output.idc23ShortcutAttemptIndex + 1}

- evalScript: ${output.idc23ShortcutChosenIndex = output.idc23ShortcutAddedIndex}
- runFlow: dismiss_media_popup_if_present_idc23.yaml

- runFlow:
    when:
      true: ${output.idc23ShortcutAdded != true && output.idc23ShortcutOptional != true}
    commands:
      - assertTrue: ${output.idc23ShortcutAdded == true}
