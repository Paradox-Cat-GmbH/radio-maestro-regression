appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: IDC23 - one STR cycle via backend
tags:
  - idc23
  - subflow
  - lifecycle
  - str
---
- runFlow:
    file: ../../../subflows/ediabas_str_sidecar_backend.yaml
    env:
      TEST_ID: ${TEST_ID}
      STR_SECONDS: "${typeof LIFECYCLE_STR_SECONDS !== 'undefined' && LIFECYCLE_STR_SECONDS ? LIFECYCLE_STR_SECONDS : '180'}"
      SETTLE_SECONDS: "${typeof LIFECYCLE_SETTLE_SECONDS !== 'undefined' && LIFECYCLE_SETTLE_SECONDS ? LIFECYCLE_SETTLE_SECONDS : '5'}"
      TIMEOUT_SECONDS: "${typeof LIFECYCLE_TIMEOUT_SECONDS !== 'undefined' && LIFECYCLE_TIMEOUT_SECONDS ? LIFECYCLE_TIMEOUT_SECONDS : '120'}"
      RETRIES: "${typeof LIFECYCLE_RETRIES !== 'undefined' && LIFECYCLE_RETRIES ? LIFECYCLE_RETRIES : '1'}"
      ECU: "${typeof LIFECYCLE_ECU !== 'undefined' && LIFECYCLE_ECU ? LIFECYCLE_ECU : 'IPB_APP1'}"
      JOB: "${typeof LIFECYCLE_JOB !== 'undefined' && LIFECYCLE_JOB ? LIFECYCLE_JOB : 'STEUERN_ROUTINE'}"
      ARGPAD: "${typeof LIFECYCLE_ARGPAD !== 'undefined' && LIFECYCLE_ARGPAD ? LIFECYCLE_ARGPAD : 'ARG;ZUSTAND_FAHRZEUG;STR;0x07'}"
      ARGWOHNEN: "${typeof LIFECYCLE_ARGWOHNEN !== 'undefined' && LIFECYCLE_ARGWOHNEN ? LIFECYCLE_ARGWOHNEN : 'ARG;ZUSTAND_FAHRZEUG;STR;0x05'}"
      ARGPARKING: "${typeof LIFECYCLE_ARGPARKING !== 'undefined' && LIFECYCLE_ARGPARKING ? LIFECYCLE_ARGPARKING : 'ARG;ZUSTAND_FAHRZEUG;STR;0x01'}"
      WAIT_AFTER_PAD_INITIAL_SECONDS: "${typeof LIFECYCLE_WAIT_AFTER_PAD_INITIAL_SECONDS !== 'undefined' && LIFECYCLE_WAIT_AFTER_PAD_INITIAL_SECONDS ? LIFECYCLE_WAIT_AFTER_PAD_INITIAL_SECONDS : '0'}"
      WAIT_AFTER_WOHNEN_ENTER_SECONDS: "${typeof LIFECYCLE_WAIT_AFTER_WOHNEN_ENTER_SECONDS !== 'undefined' && LIFECYCLE_WAIT_AFTER_WOHNEN_ENTER_SECONDS ? LIFECYCLE_WAIT_AFTER_WOHNEN_ENTER_SECONDS : '10'}"
      WAIT_AFTER_PARKING_COMMAND_SECONDS: "${typeof LIFECYCLE_WAIT_AFTER_PARKING_COMMAND_SECONDS !== 'undefined' && LIFECYCLE_WAIT_AFTER_PARKING_COMMAND_SECONDS ? LIFECYCLE_WAIT_AFTER_PARKING_COMMAND_SECONDS : '0'}"
      WAIT_AFTER_WOHNEN_RETURN_SECONDS: "${typeof LIFECYCLE_WAIT_AFTER_WOHNEN_RETURN_SECONDS !== 'undefined' && LIFECYCLE_WAIT_AFTER_WOHNEN_RETURN_SECONDS ? LIFECYCLE_WAIT_AFTER_WOHNEN_RETURN_SECONDS : '20'}"
      WAIT_AFTER_PAD_RETURN_SECONDS: "${typeof LIFECYCLE_WAIT_AFTER_PAD_RETURN_SECONDS !== 'undefined' && LIFECYCLE_WAIT_AFTER_PAD_RETURN_SECONDS ? LIFECYCLE_WAIT_AFTER_PAD_RETURN_SECONDS : '40'}"
      SKIP_INITIAL_PAD: "${typeof LIFECYCLE_SKIP_INITIAL_PAD !== 'undefined' && LIFECYCLE_SKIP_INITIAL_PAD ? LIFECYCLE_SKIP_INITIAL_PAD : 'true'}"
      PRE1_ECU: "${typeof LIFECYCLE_PRE1_ECU !== 'undefined' ? (String(LIFECYCLE_PRE1_ECU).toUpperCase() == 'NONE' ? '' : LIFECYCLE_PRE1_ECU) : 'IDCEVO25'}"
      PRE1_JOB: "${typeof LIFECYCLE_PRE1_JOB !== 'undefined' && LIFECYCLE_PRE1_JOB ? LIFECYCLE_PRE1_JOB : 'STEUERN_ROUTINE'}"
      PRE1_ARG: "${typeof LIFECYCLE_PRE1_ARG !== 'undefined' && LIFECYCLE_PRE1_ARG ? LIFECYCLE_PRE1_ARG : 'ARG;DISABLE_POSTPONE_SHUTDOWN;STR;0x01'}"
      PRE1_WAIT_SECONDS: "${typeof LIFECYCLE_PRE1_WAIT_SECONDS !== 'undefined' && LIFECYCLE_PRE1_WAIT_SECONDS ? LIFECYCLE_PRE1_WAIT_SECONDS : '20'}"
      PRE2_ECU: "${typeof LIFECYCLE_PRE2_ECU !== 'undefined' ? (String(LIFECYCLE_PRE2_ECU).toUpperCase() == 'NONE' ? '' : LIFECYCLE_PRE2_ECU) : 'IPB_APP2'}"
      PRE2_JOB: "${typeof LIFECYCLE_PRE2_JOB !== 'undefined' && LIFECYCLE_PRE2_JOB ? LIFECYCLE_PRE2_JOB : 'STEUERN_ROUTINE'}"
      PRE2_ARG: "${typeof LIFECYCLE_PRE2_ARG !== 'undefined' && LIFECYCLE_PRE2_ARG ? LIFECYCLE_PRE2_ARG : 'ARG;TEILNETZ_MASTER;STR;00000000;0000'}"
      PRE2_WAIT_SECONDS: "${typeof LIFECYCLE_PRE2_WAIT_SECONDS !== 'undefined' && LIFECYCLE_PRE2_WAIT_SECONDS ? LIFECYCLE_PRE2_WAIT_SECONDS : '40'}"
