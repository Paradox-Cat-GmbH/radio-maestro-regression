appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
onFlowStart:
  - runFlow: ../../subflows/common/start.yaml
onFlowComplete:
  - runFlow: ../../subflows/common/stop.yaml
---
- evalScript: "${output.testId = 'IDC23_STR_RADIO_INFO_CAPTURE'}"
- runFlow: ../../subflows/common/radio_ready_and_verify.yaml
- takeScreenshot: "IDC23_STR_before_suspend"
- runFlow:
    file: ../../subflows/common/lifecycle_str_once.yaml
    env:
      TEST_ID: IDC23_STR_RADIO_INFO_CAPTURE_str
      LIFECYCLE_STR_SECONDS: "${typeof STR_SECONDS !== 'undefined' && STR_SECONDS ? STR_SECONDS : '180'}"
      LIFECYCLE_ECU: IPB_APP2
      LIFECYCLE_PRE1_ECU: NONE
      LIFECYCLE_PRE2_ECU: NONE
- takeScreenshot: "IDC23_STR_after_resume"
- runFlow: ../../../subflows/verify_radio_backend.yaml
