appId: com.android.settings
onFlowStart:
  - runFlow:
      file: ../../subflows/common/studio_start_dlt.yaml
      env:
        CONTROL_SERVER_URL: ${CONTROL_SERVER_URL}
        DLT_IP: ${DLT_IP_CDE}
        DLT_PORT: ${DLT_PORT}
        CASE_ID: ${CASE_ID}
        CAPTURE_ID: ${CAPTURE_ID_CDE}
        DEVICE_ID: ${CDE_DEVICE}
onFlowComplete:
  - runFlow: ../../subflows/common/wait_for_sync_window.yaml
  - runFlow:
      file: ../../subflows/common/studio_stop_dlt.yaml
      env:
        CONTROL_SERVER_URL: ${CONTROL_SERVER_URL}
        CAPTURE_ID: ${CAPTURE_ID_CDE}
  - runFlow:
      file: ../../subflows/common/studio_bundle_evidence.yaml
      env:
        CONTROL_SERVER_URL: ${CONTROL_SERVER_URL}
        CASE_ID: ${CASE_ID}
        CAPTURE_ID: ${CAPTURE_ID_CDE}
---
# CDE side flow
- takeScreenshot: "CDE_00_start"
- takeScreenshot: "CDE_99_end"
