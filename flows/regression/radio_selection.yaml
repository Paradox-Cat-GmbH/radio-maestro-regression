appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: radio_selection
tags:
  - regression
  - radio_core
---
- evalScript: "${output.testId = 'radio_selection'}"
# --- PRECONDITION: GO TO RADIO ---
- runFlow: ../subflows/ensure_radio_source.yaml

# --- TEST 1: Select Station from All Stations ---
- tapOn: "All stations"
- tapOn:
    id: ListImageComponent ImageRightIcon
    index: 0
    retryTapIfNoChange: true

# VALIDATE (Fixed Syntax: Single line string)
- pressKey: home

# VALIDATE MINIPLAYER VISIBILITY (Fixed Syntax: Proper ID selector)
- extendedWaitUntil:
    visible:
      id: "MediaMiniPlayer"
    timeout: 5000

- tapOn:
    id: idx_icon_forward
# VALIDATE (Fixed Syntax: Single line string)
- runFlow: ../subflows/verify_radio_backend.yaml
