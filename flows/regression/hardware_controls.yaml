# Group D: Hardware Simulation (SWAG / BIM)
# Covers: IDCEVODEV-478214, 478210, 478207, 478205
# Context: "SWAG" is steering wheel input. "BIM" is center console/button input.
#
# IMPORTANT:
# - Maestro `pressKey` only supports a limited set of *remote* key names.
# - On current builds, SWAG/BIM may require host-side injection (see demo flows).

appId: com.bmwgroup.idnext.launcher
---
- evalScript: "${output.testId = 'hardware_controls'}"
- pressKey: home
- tapOn:
    id: "IconicBar.Det.Media"

# Remote media next/prev (may or may not map to SWAG/BIM on your build)
- pressKey: remote media next
- waitForAnimationToEnd
- pressKey: remote media previous
- waitForAnimationToEnd

# Remote D-Pad navigation (generic)
- pressKey: remote dpad right
- waitForAnimationToEnd
- pressKey: remote dpad center
- waitForAnimationToEnd
- runFlow: ../subflows/verify_radio_backend.yaml
