appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: hardware_controls
---
- evalScript: "${output.testId = 'hardware_controls'}"
- runFlow: ../subflows/ensure_radio_source.yaml
# Remote media next/prev (may or may not map to SWAG/BIM on your build)
- pressKey: remote media next
- waitForAnimationToEnd
- pressKey: remote media previous
- waitForAnimationToEnd

# Remote D-Pad navigation (generic)
- pressKey: remote dpad right
- waitForAnimationToEnd
- pressKey: remote dpad center
- waitForAnimationToEnd
- runFlow: ../subflows/verify_radio_backend.yaml
