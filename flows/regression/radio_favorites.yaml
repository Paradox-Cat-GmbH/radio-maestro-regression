appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: radio_favorites
tags:
  - regression
  - favorites
---
- evalScript: "${output.testId = 'radio_favorites'}"
- runFlow: ../subflows/ensure_radio_source.yaml
# 1. Add current station to favorites
- tapOn: "All stations"
- tapOn:
    id: ListImageComponent ImageRightIcon
    index: 0 # Select first station

- tapOn:
    point: 28%,74% # <--- FIND THIS ID (The "Add to Favs" button)

# 2. Go to Favourites List
- tapOn: "Favourites" # Text match

# 3. Verify it exists
- assertVisible:
    index: 0 # Something should be in the list now

# 4. Skip Next inside Favourites (IDCEVODEV-600874)
- tapOn:
    id: "idx_icon_forward" # Find ID
- runFlow: ../subflows/verify_radio_backend.yaml
