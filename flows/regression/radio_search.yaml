appId: com.bmwgroup.idnext.launcher
jsEngine: graaljs
name: radio_search
tags:
  - regression
  - search
---
- evalScript: "${output.testId = 'radio_search'}"
- runFlow: ../subflows/ensure_radio_source.yaml
# ROBUSTNESS: Ensure we are in a state where Search is visible
- tapOn: "Search"
- tapOn:
    point: 19%,14%

- inputText: "Rock"
- pressKey: enter

- assertVisible:
    text: "Rock" # Search results should contain the query
    optional: true # Don't fail hard if network is slow

# Select the first result
- tapOn:
    index: 0
- runFlow: ../subflows/verify_radio_backend.yaml
