name: Smoke checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install pyflakes yamllint
      - name: Run Python lint
        run: |
          if [ -d scripts ]; then pyflakes scripts || true; fi
      - name: Run YAML lint
        run: |
          if [ -d flows ]; then yamllint -f colored flows || true; fi
